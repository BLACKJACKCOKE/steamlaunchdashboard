<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project S Flywheel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
:root {
  --bg:#ffffff; --card-bg:#f3f4f6; --border:#e5e7eb;
  --text-h:#111827; --text-sub1:#374151; --text-sub2:#6b7280;
  --accent:#4f46e5; --green:#16a34a; --amber:#d97706; --purple:#7c3aed;
  --radius:12px; --shadow:0 1px 4px rgba(0,0,0,.08);
}
body { font-family:'Apple SD Gothic Neo','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text-h); line-height:1.6; }
.page-wrap { max-width:1280px; margin:0 auto; padding:28px 40px 60px; }
.sec-num { font-size:13px; font-weight:700; letter-spacing:2px; color:var(--accent); text-transform:uppercase; margin-bottom:4px; }
.sec-title { font-size:22px; font-weight:800; color:var(--text-h); margin-bottom:2px; }
.sec-sub { font-size:14px; color:var(--text-sub2); margin-bottom:20px; }
.flywheel-hero { display:flex; justify-content:center; margin:20px 0 28px; }
.flywheel-hero img { max-width:1000px; max-height:860px; width:auto; height:auto; border-radius:var(--radius); box-shadow:var(--shadow); }
@media(max-width:1024px){ .flywheel-hero img { max-width:92vw; max-height:640px; } }
.insights { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
.insight-card { background:var(--card-bg); border:1px solid var(--border); border-left:4px solid var(--accent); border-radius:var(--radius); padding:16px 18px; }
.insight-kicker { font-size:12px; font-weight:700; letter-spacing:1.5px; color:var(--accent); text-transform:uppercase; margin-bottom:6px; }
.insight-title { font-size:15px; font-weight:800; color:var(--text-h); margin-bottom:8px; line-height:1.3; }
.insight-body { font-size:14px; color:var(--text-sub1); line-height:1.6; }
.insight-card.green { border-left-color:var(--green); }
.insight-card.green .insight-kicker { color:var(--green); }
.insight-card.amber { border-left-color:var(--amber); }
.insight-card.amber .insight-kicker { color:var(--amber); }
.insight-card.purple { border-left-color:var(--purple); }
.insight-card.purple .insight-kicker { color:var(--purple); }
.summary { background:linear-gradient(135deg,#f0f4ff,#fafbff); border:1px solid #c7d2fe; border-radius:var(--radius); padding:20px 24px; margin-bottom:24px; }
.summary h3 { font-size:14px; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
.summary p { font-size:14px; color:var(--text-h); line-height:1.7; }
.summary p strong { color:var(--accent); }
@media(max-width:1024px){.insights{grid-template-columns:1fr}}
</style>
<link rel="stylesheet" href="../assets/theme.css">

<body class="embed">
<div class="page-wrap">
  <div class="sec-num">P0 · Executive Overview</div>
  <h1 class="sec-title">Project S Flywheel</h1>
  <p class="sec-sub">전체 대시보드 데이터를 관통하는 Project S 론칭 성장 동력 구조</p>
